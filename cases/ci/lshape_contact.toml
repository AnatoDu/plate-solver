# CI-копия lshape_contact (малые Q и mor_iter).

[geometry]
kind = "L"
side = 1.0
cut = 0.5

[bc]
type = "soft_hinge"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[contact]
enabled = true
gap_factor = 0.5
beta = 1.0
max_iter = 300
tol = 1.0e-12

[discretization]
p = 8
Q = 40
grid_n = 16

[verify]
reference = "none"

[output]
dir = "results/ci/lshape_contact"

