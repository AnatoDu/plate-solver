# Ступень: прямоугольник, шарнир (SSSS) — эталон: ряд Навье (трек C).

[geometry]
kind = "rectangle"
x1 = 0.0
x2 = 1.0
y1 = 0.0
y2 = 1.0

[bc]
type = "soft_hinge"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[discretization]
p = 10
Q = 160

[verify]
reference = "analytic"   # ряд Навье с контролем остатка (трек C фазы 3):
# прямые края ⇒ мягкий шарнир ≡ истинный (NOTES §8); сравнение в центре.
tol = 5.6e-6             # факт 1.85e-6 × 3 (p=10, Q=160)

[output]
dir = "results/ladder/rect_hinge"

