# CI: смешанные КУ (Леви: x-шарнир, y-защемление) — эталон: ряд Леви.

[geometry]
kind = "rectangle"
x1 = 0.0
x2 = 1.0
y1 = 0.0
y2 = 1.0

[bc]
type = "mixed"

[[bc.sides]]
side = "x1"
type = "hinge"

[[bc.sides]]
side = "x2"
type = "hinge"

[[bc.sides]]
side = "y1"
type = "clamped"

[[bc.sides]]
side = "y2"
type = "clamped"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[discretization]
p = 12
Q = 160
grid_n = 16

[verify]
reference = "analytic"
tol = 2.1e-8             # факт 6.96e-9 × 3

[output]
dir = "results/ci/rect_levy"
