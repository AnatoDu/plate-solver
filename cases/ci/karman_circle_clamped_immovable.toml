# Карман (геометрическая нелинейность) — защемлённый круг, неподвижная кромка.
# Быстрый CI-случай (Q ≤ 256, умеренная нагрузка): демонстрирует мембранное
# ужесточение (w_max < w_max_classic). Безразмерно: E=h=a=1 ⇒ P̄ = q0.
# Эталоны большого прогиба (Way/Тимошенко/Hencky) — tests/test_karman.py.

[geometry]
kind = "circle"
a = 1.0

[bc]
type = "clamped"

[load]
type = "uniform"
q0 = 3.0                 # P̄ = 3.0 ⇒ w/h ≈ 0.48 (умеренно большой прогиб)

[model]
theory = "karman"
inplane_bc = "immovable" # u = v = 0 на ∂Ω (мембранное натяжение максимально)
E = 1.0
nu = 0.3
h = 1.0
n_load_steps = 2         # тёплый старт по уровням нагрузки
karman_tol = 1.0e-6
karman_max_iter = 200

[discretization]
p = 10
Q = 140
grid_n = 48

[verify]
reference = "none"       # независимых эталонов Кармана нет в references.py;
                         # верификация — эталонами benchmarks.py в тестах

[output]
dir = "results/karman_circle_clamped_immovable"
