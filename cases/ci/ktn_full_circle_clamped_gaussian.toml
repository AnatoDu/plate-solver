# Полная нелинейная КТН — защемлённый круг, ГАУССОВА (неравномерная) нагрузка.
# Быстрый CI-случай: проявляется член КТН (A) −h_*²Δq (§7). Под неравномерной
# нагрузкой (Δq ≠ 0) уже и СРЕДИННЫЙ прогиб КТН отличается от классики — второй
# способ показать эффект КТН (первый — лицевые величины под равномерной).
# Малая нагрузка (линейный режим): виден чистый член (A) без мембранного
# ужесточения Кармана. Тест подписи — tests/test_ktn_full.py.

[geometry]
kind = "circle"
a = 1.0

[bc]
type = "clamped"

[load]
type = "gaussian"
q0 = 2.0e-5              # амплитуда (малая: линейный режим)
x0 = 0.0                 # центр
y0 = 0.0
sigma = 0.25            # ширина (уже гаусс — сильнее член A)

[model]
theory = "ktn_full"
inplane_bc = "immovable"
E = 1.0
nu = 0.3
h = 0.2
n_load_steps = 1        # линейный режим — один шаг
karman_tol = 1.0e-7
karman_max_iter = 200

[discretization]
p = 12
Q = 160
grid_n = 48

[verify]
reference = "none"

[output]
dir = "results/ktn_full_circle_clamped_gaussian"
