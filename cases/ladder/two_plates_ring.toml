# Пара пластин, ворота (c, stretch): круг (верхняя) над кольцом (нижняя) —
# контакт на пересечении планформ, над дыркой кольца реакции нет;
# межсеточного переноса нет (докстринг TwoPlateMOR). Топология зоны
# фиксируется в baselines (материал главы 4).

[geometry]
kind = "circle"
a = 1.0

[bc]
type = "soft_hinge"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[contact]
enabled = true
target = "plate2"
gap = 0.0
beta = 1.0
max_iter = 3000
tol = 1.0e-12

[plate2]
[plate2.bc]
type = "soft_hinge"
[plate2.load]
type = "uniform"
q0 = 1.0
[plate2.geometry]
kind = "annulus"
a = 1.0
b = 0.4

[discretization]
p = 8
Q = 96
grid_n = 24

[verify]
reference = "none"

[output]
dir = "results/ladder/two_plates_ring"
