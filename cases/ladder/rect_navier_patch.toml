# Ступень: прямоугольник SSSS, ЧАСТИЧНАЯ нагрузка (patch) — эталон: ряд
# Навье с замкнутыми синус-коэффициентами (фабрика аналитики).
# Сравнение В ЦЕНТРЕ ЗОНЫ. verify.tol заморожен протоколом «факт × 3»:
#   факт p=12, Q=512: rel = 7.528e-4 → tol = 2.3e-3.
# Диагноз точности: ошибка — квадратурный ПОЛ СТУПЕНЧАТОЙ МАСКИ зоны
# (немонотонна по Q: 1.5e-2 @128 → 7.5e-4 @512 → 1.4e-3 @1024; слабо
# зависит от p) — та же природа, что пол маски кривой границы (NOTES §13);
# потолок 1e-6 достижим только для ГЛАДКИХ нагрузок.

[geometry]
kind = "rectangle"
x1 = 0.0
x2 = 1.0
y1 = 0.0
y2 = 1.0

[bc]
type = "soft_hinge"

[load]
type = "patch"
q0 = 4.0

[load.zone]
kind = "rectangle"
x1 = 0.2
x2 = 0.5
y1 = 0.2
y2 = 0.5

[model]
h = 0.06

[discretization]
p = 12
Q = 512
grid_n = 48

[verify]
reference = "analytic"
tol = 2.3e-3

[output]
dir = "results/ladder/rect_navier_patch"
