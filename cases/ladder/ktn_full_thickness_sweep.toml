# Полная нелинейная КТН — серия толщин (Gate R4: гашение поправки O(h²/L²)).
# Тяжёлая ступень (маркер big). Один файл = одна толщина (h/L = 0.2, где эффект
# КТН максимален ≈ 2 %); полный свип по h/L ∈ {0.2, 0.1, 0.05, 0.02} при
# фиксированном P̄ — tests/test_ktn_full.py::test_gate_r4_correction_vanishes_as_h2.
# Боевые параметры (p=14, Q=200). Безразмерно: E=a=1 ⇒ P̄ = q0/h⁴ = 5.

[geometry]
kind = "circle"
a = 1.0

[bc]
type = "clamped"

[load]
type = "uniform"
q0 = 0.008               # P̄ = 5 (та же безразмерная нагрузка, что в свипе R4)

[model]
theory = "ktn_full"
inplane_bc = "immovable"
E = 1.0
nu = 0.3
h = 0.2
n_load_steps = 6
karman_tol = 1.0e-7
karman_max_iter = 400

[discretization]
p = 14
Q = 200
grid_n = 48

[verify]
reference = "none"

[output]
dir = "results/ktn_full_thickness_sweep"
