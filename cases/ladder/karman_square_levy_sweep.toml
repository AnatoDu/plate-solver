# Карман — защемлённый квадрат, боевые параметры против таблицы Levy (ν=0.316).
# Тяжёлая ступень (маркер big): верхняя точка таблицы Levy/IGA
# P̄ = 402 ⇒ w_c/h ≈ 1.902 (§A.4). Свип всей таблицы Levy — в
# tests/test_karman.py::test_gate_k_levy_square_clamped_table. Числа Levy
# кросс-проверены IGA (arXiv:1411.3508). Безразмерно: E=h=a=1 ⇒ P̄ = q0.

[geometry]
kind = "rectangle"
x1 = 0.0
x2 = 1.0
y1 = 0.0
y2 = 1.0

[bc]
type = "clamped"

[load]
type = "uniform"
q0 = 402.0               # P̄ = 402 (верхняя точка таблицы Levy)

[model]
theory = "karman"
inplane_bc = "immovable"
E = 1.0
nu = 0.316
h = 1.0
n_load_steps = 24        # большой прогиб (w_c/h ≈ 1.9): мелкие шаги нагрузки
karman_tol = 1.0e-6
karman_max_iter = 500

[discretization]
p = 12
Q = 160
grid_n = 48

[verify]
reference = "none"

[output]
dir = "results/karman_square_levy_sweep"
