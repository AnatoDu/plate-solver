# Ступень: прямоугольник SSSS, точечная сила в ПРОИЗВОЛЬНОЙ точке (0.4, 0.6)
# — эталон: ряд Навье для δ-нагрузки (фабрика, F4; остаток ряда ~1/N²,
# сертификат 1e-6 ≪ базисной ошибки). Сравнение в точке приложения.
# point решателя = регуляризованное пятно (NOTES §18): доминирует
# базисная ошибка полиномов на w ~ r²ln r (~1 %, как на круге).
# verify.tol заморожен «факт × 3»: факт p=12, Q=256: rel = 1.073e-2 → 3.3e-2.

[geometry]
kind = "rectangle"
x1 = 0.0
x2 = 1.0
y1 = 0.0
y2 = 1.0

[bc]
type = "soft_hinge"

[load]
type = "point"
P = 5.0
x0 = 0.4
y0 = 0.6

[model]
h = 0.06

[discretization]
p = 12
Q = 256
grid_n = 48

[verify]
reference = "analytic"
tol = 3.3e-2

[output]
dir = "results/ladder/rect_navier_point"
