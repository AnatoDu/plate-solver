# Карман — защемлённый круг, БОЛЬШАЯ нагрузка (мембранный предел Hencky, Gate M).
# Тяжёлая ступень лестницы (маркер big в tests/test_karman.py): P̄ = 1000 ⇒
# w/h ≈ 6.4, изгибом можно пренебречь. Пластина жёстче мембраны ⇒ решатель
# подходит к асимптоте 0.653·P̄^{1/3} = 6.53 СНИЗУ (отклонение < 3 %).
# Безразмерно: E=h=a=1 ⇒ P̄ = q0. Число 0.653 — benchmarks.hencky_center_deflection.

[geometry]
kind = "circle"
a = 1.0

[bc]
type = "clamped"

[load]
type = "uniform"
q0 = 1000.0              # P̄ = 1000 (Gate M: мембранный предел)

[model]
theory = "karman"
inplane_bc = "immovable"
E = 1.0
nu = 0.3                 # ν эталона Hencky/Way
h = 1.0
n_load_steps = 20        # большой прогиб — мелкие шаги по нагрузке (§5.2)
karman_relax = 1.0
karman_tol = 1.0e-6
karman_max_iter = 250

[discretization]
p = 12
Q = 80
grid_n = 48

[verify]
reference = "none"

[output]
dir = "results/karman_circle_hencky_limit"
