# CI-копия circle_soft (лёгкая).

[geometry]
kind = "circle"
a = 1.0

[bc]
type = "soft_hinge"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[discretization]
p = 6
Q = 96
grid_n = 16

[verify]
reference = "analytic"
cross_1d = true
tol = 2.0e-2   # факт 9.1e-3

[output]
dir = "results/ci/circle_soft"

