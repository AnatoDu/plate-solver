# CI-копия annulus_soft (лёгкая).

[geometry]
kind = "annulus"
a = 1.0
b = 0.4

[bc]
type = "soft_hinge"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[discretization]
p = 10
Q = 256
grid_n = 16

[verify]
reference = "analytic"
cross_1d = true
tol = 5.0e-2
model_gap = true

[output]
dir = "results/ci/annulus_soft"

