# Ступень: L-форма, шарнир; двухколоночная сверка МКЭ (нужен extra fem).

[geometry]
kind = "L"
side = 1.0
cut = 0.5

[bc]
type = "soft_hinge"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[discretization]
p = 10
Q = 120

[verify]
reference = "fem"
tol = 8.0e-2   # факт Marcus 2.64e-2 × 3; Kirchhoff-строка — инфо (парадокс)

[output]
dir = "results/ladder/lshape_soft"

