# Ступень «кольцо, изгиб»: мягкий шарнир, обе границы кривые.
# verify.tol заморожен протоколом «потолок 1e-2 → факт × 3»:
#   факт Q=1024, p=10: 2D↔analytic rel = 1.140e-3, 2D↔1D rel = 1.140e-3
#   (квадратурный пол двух кривых границ) ⇒ tol = 3.5e-3. Журнал: PROGRESS.md.

[geometry]
kind = "annulus"
a = 1.0
b = 0.4

[bc]
type = "soft_hinge"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[discretization]
p = 10
Q = 1024

[verify]
reference = "analytic"
cross_1d = true
tol = 3.5e-3
model_gap = true        # истинный Кирхгоф: разрыв ~9.7 % (инфо, вне допуска)

[output]
dir = "results/annulus_soft"
