# Ступень MMS: прямоугольник (w=ω², полиномиальная ω — машинно).

[geometry]
kind = "rectangle"
x1 = 0.0
x2 = 1.0
y1 = 0.0
y2 = 1.0

[bc]
type = "clamped"

[load]
type = "uniform"
q0 = 4.0

[model]
h = 0.06

[discretization]
p = 8
Q = 64

[verify]
reference = "mms"
tol = 1.0e-8

[output]
dir = "results/ladder/mms_rect"

