# CI: точечная сила (грубое пятно eps=0.1).

[geometry]
kind = "circle"
a = 1.0

[bc]
type = "clamped"

[load]
type = "point"
P = 1.0
x0 = 0.0
y0 = 0.0
eps = 0.1

[model]
h = 0.06

[discretization]
p = 10
Q = 256
grid_n = 16

[verify]
reference = "analytic"
tol = 1.5e-1   # eps=0.1 грубое: факт ~3.4e-2 (см. baselines)

[output]
dir = "results/ci/circle_point"

